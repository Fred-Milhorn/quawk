[[case]]
family = "control-flow-loop-break-continue"
spec_area = "Language Surface / Backend and Inspection"
program = '''
BEGIN {
    for (i = 0; i < 5; i = i + 1) {
        if (i == 2) {
            break
        } else {
            continue
        }
    }
}
'''
expected_uses_host_runtime = false
expected_supports_public_backend_execution = true
expected_supports_ir_asm = true
notes = "Representative break/continue loop-control programs now lower through the reusable backend/runtime path and support inspection output."

