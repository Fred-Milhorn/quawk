[[case]]
family = "user-defined-functions"
spec_area = "Language Surface / Backend and Inspection"
program = '''
function f(x) { return x + 1 }
BEGIN { print f(2) }
'''
expected_uses_host_runtime = false
expected_supports_public_backend_execution = true
expected_supports_ir_asm = true
notes = "Representative direct-BEGIN function programs now lower through the backend and support inspection output."

[[case]]
family = "record-control-next"
spec_area = "Language Surface / Backend and Inspection"
program = '''
/skip/ { next }
{ print $0 }
'''
expected_uses_host_runtime = false
expected_supports_public_backend_execution = true
expected_supports_ir_asm = true
notes = "Simple next-driven record control now lowers through the reusable backend/runtime path and supports inspection output."

