# Implemented-family coverage matrix.

[[coverage]]
family = "cli-basics"
selection_keys = [
  "one-true-awk:T.-f-f",
  "one-true-awk:T.argv",
  "gawk:argarray",
  "gawk:cmdlinefsbacknl",
]
notes = "CLI coverage is currently anchored mostly by skip entries because shell-driver support and richer operand adaptation land in later P11 tasks."

[[coverage]]
family = "pattern-action-execution"
selection_keys = [
  "one-true-awk:p.12",
  "one-true-awk:p.23",
  "gawk:assignnumfield2",
  "gawk:range1",
]
notes = "The seed matrix covers BEGIN, record, regex, and range forms; later expansion adds more mixed-program depth."

[[coverage]]
family = "regex-selection"
selection_keys = [
  "one-true-awk:p.12",
  "one-true-awk:p.13",
]

[[coverage]]
family = "default-print-patterns"
selection_keys = [
  "one-true-awk:p.23",
  "gawk:range1",
]

[[coverage]]
family = "scalar-assignment"
selection_keys = [
  "gawk:assignnumfield",
  "gawk:assignnumfield2",
]

[[coverage]]
family = "associative-arrays"
selection_keys = [
  "one-true-awk:t.a",
]
notes = "The first matrix anchor is One True Awk primary; gawk corroboration lands in the later expansion tasks."

[[coverage]]
family = "fields"
selection_keys = [
  "gawk:assignnumfield",
  "one-true-awk:t.set0a",
  "one-true-awk:t.NF",
  "one-true-awk:T.split",
  "gawk:splitvar",
]

[[coverage]]
family = "control-flow"
selection_keys = [
  "one-true-awk:t.if",
  "one-true-awk:t.do",
  "one-true-awk:t.break",
]

[[coverage]]
family = "record-control"
selection_keys = [
  "one-true-awk:t.next",
  "one-true-awk:t.exit",
  "one-true-awk:T.nextfile",
]

[[coverage]]
family = "expressions-and-coercions"
selection_keys = [
  "one-true-awk:T.expr",
  "one-true-awk:t.substr",
  "gawk:getnr2tb",
]

[[coverage]]
family = "user-defined-functions"
selection_keys = [
  "one-true-awk:t.fun",
  "one-true-awk:T.func",
]

[[coverage]]
family = "builtin-variables"
selection_keys = [
  "one-true-awk:p.4",
  "one-true-awk:p.24",
  "one-true-awk:t.NF",
  "one-true-awk:T.argv",
  "gawk:argarray",
  "gawk:getnr2tb",
]

[[coverage]]
family = "implemented-builtins"
selection_keys = [
  "one-true-awk:T.builtin",
  "one-true-awk:T.split",
  "gawk:splitvar",
  "gawk:substr",
]

[[coverage]]
family = "multi-file-input-processing"
selection_keys = [
  "one-true-awk:p.24",
  "one-true-awk:T.nextfile",
  "gawk:argarray",
]
