# Curated inventory for the pinned upstream compatibility suites.
#
# `[[case]]` entries classify individual upstream cases as `run` or `skip`.
# `[[coverage]]` entries map the currently implemented compatibility feature
# families to the upstream case inventory so growth is tied to the public
# contract in SPEC.md instead of raw upstream test counts.

# Runnable starter slice.

[[case]]
suite = "one-true-awk"
case_id = "p.12"
path = "third_party/onetrueawk/testdir/p.12"
status = "run"
adapter = "onetrueawk-program-file"
tags = ["posix", "regex", "records"]

[[case]]
suite = "one-true-awk"
case_id = "p.13"
path = "third_party/onetrueawk/testdir/p.13"
