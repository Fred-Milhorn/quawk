name: ci-fast

on:
  workflow_dispatch:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install LLVM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            llvm

      - name: Export LLVM tool directory
        run: echo "$(llvm-config --bindir)" >> "$GITHUB_PATH"

      - name: Sync development dependencies
        run: uv sync --dev

      - name: Run non-compatibility pytest suite
        run: uv run pytest -q -m "not compat"
