name: compat-reference

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/compat-reference.yml"
      - "CONTRIBUTING.md"
      - "README.md"
      - "docs/compatibility.md"
      - "docs/getting-started.md"
      - "docs/release-checklist.md"
      - "docs/roadmap.md"
      - "docs/testing.md"
      - "pyproject.toml"
      - "src/**"
      - "tests/**"
      - "third_party/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/compat-reference.yml"
      - "CONTRIBUTING.md"
      - "README.md"
      - "docs/compatibility.md"
      - "docs/getting-started.md"
      - "docs/release-checklist.md"
      - "docs/roadmap.md"
      - "docs/testing.md"
      - "pyproject.toml"
      - "src/**"
      - "tests/**"
      - "third_party/**"

permissions:
  contents: read

jobs:
  compat-reference:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Initialize submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install LLVM and upstream build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            clang \
            gettext \
            libtool \
            llvm \
            make \
            texinfo

      - name: Export LLVM tool directory
        run: echo "$(llvm-config --bindir)" >> "$GITHUB_PATH"

      - name: Sync development dependencies
        run: uv sync --dev

      - name: Bootstrap pinned upstream references
        run: uv run quawk-upstream bootstrap

      - name: Run reference compatibility subset
        run: uv run pytest -m compat_reference
