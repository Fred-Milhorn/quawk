[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "aster"
version = "0.1.0"
description = "Aster AWK compiler"
readme = "README.md"
requires-python = ">=3.14"
dependencies = []

[project.scripts]
aster = "aster.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.4,<9",
]

[tool.setuptools.packages.find]
where = ["src"]
